[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fuzz = { runs = 256 }
invariant = { runs = 64, depth = 256, fail_on_revert = false }
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256, depth = 512 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

# Remappings are loaded from remappings.txt (populated by task 2.1).
# See https://book.getfoundry.sh/reference/config/
