[project]
name = "agentpay-canonical-json"
version = "0.1.0"
description = "Canonical JSON encoder, decoder, and hash for AgentPay signed records"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "hypothesis>=6.92.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatchling.build.targets.wheel]
packages = ["src/agentpay_canonical_json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -v"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
